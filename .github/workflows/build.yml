name: Build APK for Android 16 (API 36)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: echo "date=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      # Cachés para acelerar builds futuros
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global
          restore-keys: ${{ runner.os }}-buildozer-global

      - name: Cache Buildozer directory in app
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-app
          restore-keys: ${{ runner.os }}-buildozer-app

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk
          restore-keys: ${{ runner.os }}-android-sdk

      # Instalar dependencias del sistema (incluyendo Rust)
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext curl
          # Instalar Rust (necesario para p4a develop)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Agregar PPA deadsnakes para Python 3.14 (requerido por p4a develop)
      - name: Install Python 3.14
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y python3.14 python3.14-venv python3.14-dev

      # Crear y activar entorno virtual con Python 3.14
      - name: Setup virtual environment with Python 3.14
        run: |
          python3.14 -m venv venv_p4a
          source venv_p4a/bin/activate
          echo "VIRTUAL_ENV=$PWD/venv_p4a" >> $GITHUB_ENV
          echo "$PWD/venv_p4a/bin" >> $GITHUB_PATH

      # Instalar Buildozer (rama master) y dependencias de Python
      - name: Install Buildozer and dependencies
        run: |
          source venv_p4a/bin/activate
          pip install --upgrade pip
          pip install git+https://github.com/kivy/buildozer
          pip install legacy-cgi setuptools cython==0.29.34

      # Construir la APK
      - name: Build with Buildozer
        run: |
          source venv_p4a/bin/activate
          # Forzar respuesta sí a todas las preguntas de licencias
          yes | buildozer -v android debug

      # Subir el APK generado
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-iluminacion-apk
          path: bin/*.apk
